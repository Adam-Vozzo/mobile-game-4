name: auto-merge-routine-prs

# Routines (Claude Code sessions) push to branches prefixed with `claude/`
# and open the resulting PRs as drafts. This workflow marks those PRs ready
# for review and enables auto-merge so they land automatically once CI passes.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Mark ready for review
        if: github.event.pull_request.draft == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          gh api graphql -f query='
            mutation($id: ID!) {
              markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                pullRequest { id number isDraft }
              }
            }' -f id="$PR_NODE_ID"

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --squash --auto "$PR_URL"

      # Bot-driven squash merges run under GITHUB_TOKEN, so the resulting
      # push to `main` does not fire `deploy-pages.yml` (per GitHub's rule
      # that GITHUB_TOKEN-driven events don't trigger downstream workflows).
      # `workflow_dispatch` is documented as an exception, so once the
      # auto-merge completes we explicitly dispatch the deploy.
      - name: Dispatch deploy-pages once merged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          for i in $(seq 1 60); do
            STATE=$(gh pr view "$PR_URL" --json merged,state -q '.merged,.state' || echo "false")
            MERGED=$(echo "$STATE" | head -1)
            CLOSED=$(echo "$STATE" | tail -1)
            if [ "$MERGED" = "true" ]; then
              echo "PR merged — dispatching deploy-pages."
              gh workflow run deploy-pages.yml --ref main
              exit 0
            fi
            if [ "$CLOSED" = "CLOSED" ]; then
              echo "PR closed without merge — skipping deploy."
              exit 0
            fi
            echo "Waiting for auto-merge ($i/60)..."
            sleep 30
          done
          echo "Timed out after 30 min waiting for auto-merge."
          exit 1
